    HouseholdUpdate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 3
          example: "Mustermann Family"

    InviteResponse:
      type: object
      required:
        - inviteUrl
      properties:
        inviteUrl:
          type: string
          format: uri
          example: "https://app.example.com/invite/f3ce1a6b-aba1-478d-9f01-ec484f23ce60"

    TransferOwnershipRequest:
      type: object
      required:
        - memberId
      properties:
        memberId:
          type: string
          format: uuid
          description: The ID of the member to transfer ownership to.
          example: "7c3a40a8-3f57-4645-8cf5-820a6a8d3613"

    MemberUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          example: "Jane Doe"
        email:
          type: string
          format: email
          example: "jane.doe@example.com"

    PasswordChangeRequest:
      type: object
      required:
        - oldPassword
        - newPassword
      properties:
        oldPassword:
          type: string
          format: password
          example: "oldSecurePassword123"
        newPassword:
          type: string
          format: password
          minLength: 8
          example: "newSecurePassword456"

    UserPreferences:
      type: object
      properties:
        theme:
          type: string
          enum: [light, dark]
          example: "dark"
        language:
          type: string
          enum: [en, de]
          example: "de"
