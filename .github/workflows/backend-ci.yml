name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'api/openapi.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'backend/**'
      - 'api/openapi.yml'

defaults:
  run:
    working-directory: backend

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Java
        uses: actions/setup-java@v5.4.0
        with:
          java-version: '25'
          distribution: temurin
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Run tests
        run: ./mvnw verify

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5.4.0
        with:
          java-version: '25'
          distribution: temurin
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Build and generate coverage report
        run: ./mvnw verify

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        with:
          projectBaseDir: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
