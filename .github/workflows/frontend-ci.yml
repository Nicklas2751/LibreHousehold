name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'api/openapi.yml'
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths:
      - 'frontend/**'
      - 'api/openapi.yml'

defaults:
  run:
    working-directory: frontend

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
      options: --user 1001
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      # Needed for the openapi generation
      - uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate OpenAPI sources
        run: npm run openapi

      - name: Run tests
        run: npm test

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate OpenAPI sources
        run: npm run openapi

      - name: Generate Paraglide sources
        run: npm run paraglide

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [ test, lint ]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        with:
          projectBaseDir: frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
